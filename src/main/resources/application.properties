spring.application.name=ledgermindbackend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

app.base-url=${APP_BASE_URL}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

google.oauth.client-id=${GOOGLE_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET}
google.oauth.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI}

jwt.secret=${JWT_SECRET}
jwt.expiry-days=30

aws.region=${AWS_REGION:ap-south-1}
aws.endpoint-override=

aws.sns.raw-email-topic-arn=${SNS_RAW_EMAIL_TOPIC_ARN}
aws.sqs.raw-email-queue-url=${SQS_RAW_EMAIL_QUEUE_URL}

telegram.bot-username=${TELEGRAM_BOT_USERNAME}
telegram.bot-token=${TELEGRAM_BOT_TOKEN}

# AI provider — "gemini" or "ollama"
ai.provider=${AI_PROVIDER}

# Gemini (only used when ai.chat.provider=gemini)
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

# Ollama (only used when ai.chat.provider=ollama)
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${OLLAMA_MODEL:qwen2.5:14b}
spring.ai.ollama.chat.options.temperature=0.3

# Chat memory config
ledgermind.advisor.memory.ttl-hours=24
ledgermind.advisor.memory.max-messages=20

ledgermind.scan.cron=0 */15 * * * *

telegram.api-url=${TELEGRAM_API_URL}

