spring.application.name=ledgermindbackend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

app.base-url=${APP_BASE_URL}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

google.oauth.client-id=${GOOGLE_CLIENT_ID}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET}
google.oauth.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI}
google.oauth.gmail-redirect-uri=${GOOGLE_OAUTH_GMAIL_REDIRECT_URI}

jwt.secret=${JWT_SECRET}
jwt.expiry-days=30

aws.region=${AWS_REGION:ap-south-1}
aws.endpoint-override=

aws.sns.raw-email-topic-arn=${SNS_RAW_EMAIL_TOPIC_ARN}
aws.sqs.raw-email-queue-url=${SQS_RAW_EMAIL_QUEUE_URL}

telegram.bot-username=${TELEGRAM_BOT_USERNAME}
telegram.bot-token=${TELEGRAM_BOT_TOKEN}

telegram.webhook-secret=${TELEGRAM_WEBHOOK_SECRET:}

ai.categorization.provider=${AI_CATEGORIZATION_PROVIDER:${AI_PROVIDER:gemini}}
ai.categorization.model=${AI_CATEGORIZATION_MODEL:}
ai.chat.provider=${AI_CHAT_PROVIDER:${AI_PROVIDER:gemini}}
ai.chat.model=${AI_CHAT_MODEL:}

# OpenAI (only used when a task's provider=openai)
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}

# Gemini (only used when a task's provider=gemini)
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=${GEMINI_MODEL:gemini-2.5-flash}

# Ollama (only used when a task's provider=ollama)
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${OLLAMA_MODEL:qwen2.5:14b}
spring.ai.ollama.chat.options.temperature=0.3

# ── Rate limiting (per user, protects LLM credits) ──────────────────────────
ratelimit.telegram-chat.limit=${RL_TELEGRAM_CHAT_LIMIT:5}
ratelimit.telegram-chat.window=${RL_TELEGRAM_CHAT_WINDOW:1m}
ratelimit.telegram-cash-log.limit=${RL_TELEGRAM_CASHLOG_LIMIT:10}
ratelimit.telegram-cash-log.window=${RL_TELEGRAM_CASHLOG_WINDOW:1m}

# Chat memory config
ledgermind.advisor.memory.ttl-hours=24
ledgermind.advisor.memory.max-messages=20

ledgermind.scan.cron=0 */15 * * * *

# Nightly Telegram daily-insights summary — 10 PM IST by default
ledgermind.insights.cron=0 0 22 * * *

telegram.api-url=${TELEGRAM_API_URL}

